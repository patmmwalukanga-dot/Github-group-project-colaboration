<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScholarTask - High-Fidelity Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ScholarTask Color Palette Applied */
    :root {
      --bg-dark: #0f172a;
      --panel-dark: #1e293b;
      --accent-purple: #8b5cf6;
      --text-main: #f8fafc;
    }
    body { background-color: var(--bg-dark); color: var(--text-main); }
    .panel-bg { background-color: var(--panel-dark); }
    .btn-purple { background-color: var(--accent-purple); }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script type="text/babel">
    const API_BASE_URL = "http://localhost:5000/api/students";

    function App() {
      // States matching your backend telemetry
      const [students, setStudents] = React.useState([]);
      const [telemetry, setTelemetry] = React.useState({ totalStudents: 0, avgAttendance: 0, passingRate: 0 });
      
      const loadData = async () => {
        try {
          const res = await fetch(API_BASE_URL);
          const data = await res.json();
          if(data.success) {
            setStudents(data.records);
            setTelemetry(data.telemetry);
          }
        } catch (e) { console.error("Sync Error", e); }
      };

      React.useEffect(() => { loadData(); }, []);

      return (
        <div className="p-8">
          <nav className="flex justify-between items-center mb-8 pb-4 border-b border-slate-700">
            <h1 className="text-2xl font-bold">ScholarTask</h1>
            <div className="flex gap-4">
               <div className="bg-panel-dark px-4 py-2 rounded-lg">Total: {telemetry.totalStudents}</div>
            </div>
          </nav>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="panel-bg p-6 rounded-2xl border border-slate-700">
              <h2 className="text-lg font-semibold mb-4">Execute Pipeline</h2>
              {/* Form points to backend */}
              <form onSubmit={async (e) => { e.preventDefault(); /* Add POST logic here */ await loadData(); }} className="space-y-4">
                 <input className="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg" placeholder="Name" id="name" />
                 <button className="w-full p-3 btn-purple rounded-lg font-bold">Submit Node</button>
              </form>
            </div>
            
            <div className="panel-bg p-6 rounded-2xl border border-slate-700">
              <h2 className="text-lg font-semibold mb-4">Live Matrix</h2>
              <ul className="space-y-2">
                {students.map(s => <li key={s.id} className="p-2 bg-slate-900 rounded">{s.name} - {s.grade}</li>)}
              </ul>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App />);
  </script>
</body>
</html>

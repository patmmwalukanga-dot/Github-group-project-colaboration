<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Student Marketplace</title>
  <link rel="stylesheet" href="Student Marketplace.css">
  <style>
    .profile-page { max-width: 1100px; margin: 30px auto; padding: 0 20px 40px; }
    .profile-grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }
    .sidebar-card { background: var(--card-bg, #fff); border-radius: 16px; padding: 24px; text-align: center; border: 1px solid var(--border-color, #eee); }
    .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer; }
    .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .avatar-placeholder { width: 100%; height: 100%; border-radius: 50%; background: var(--accent, #4f46e5); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 700; }
    .avatar-upload-label { display: block; margin-top: 8px; font-size: 12px; color: var(--accent, #4f46e5); cursor: pointer; text-decoration: underline; }
    .sidebar-name { font-size: 20px; font-weight: 700; color: var(--text-color, #1a1a1a); margin: 0; }
    .sidebar-uni { font-size: 13px; color: var(--text-secondary, #6b7280); margin: 4px 0 16px; }
    .sidebar-stats { display: flex; justify-content: space-around; margin: 16px 0; padding: 12px 0; border-top: 1px solid var(--border-color, #eee); border-bottom: 1px solid var(--border-color, #eee); }
    .sidebar-stat { text-align: center; }
    .sidebar-stat-num { font-size: 22px; font-weight: 700; color: var(--accent, #4f46e5); display: block; }
    .sidebar-stat-label { font-size: 11px; color: var(--text-secondary, #6b7280); }
    .sidebar-btn { display: block; width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; text-align: center; cursor: pointer; border: none; }
    .sidebar-btn-primary { background: var(--accent, #4f46e5); color: #fff; }
    .sidebar-btn-secondary { background: var(--card-bg-secondary, #f3f4f6); color: var(--text-color, #1a1a1a); }
    .sidebar-btn-danger { background: transparent; color: #ef4444; }
    .main-card { background: var(--card-bg, #fff); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border-color, #eee); }
    .card-heading { font-size: 18px; font-weight: 700; color: var(--text-color, #1a1a1a); margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
    .compact-list { list-style: none; padding: 0; margin: 0; }
    .compact-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--border-color, #eee); flex-wrap: wrap; }
    .compact-list-item:last-child { border-bottom: none; }
    .compact-list-title { flex: 1; font-weight: 600; color: var(--text-color, #1a1a1a); min-width: 120px; }
    .compact-list-price { font-weight: 700; color: var(--accent, #4f46e5); }
    .compact-list-status { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-sold { background: #fee2e2; color: #991b1b; }
    .btn-edit-sm { padding: 5px 12px; background: var(--accent-light, #eef2ff); color: var(--accent, #4f46e5); border-radius: 6px; font-size: 12px; cursor: pointer; border: none; font-weight: 600; }
    .btn-edit-sm:hover { filter: brightness(0.95); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-color, #1a1a1a); margin-bottom: 4px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border-color, #ddd); border-radius: 8px; font-size: 14px; background: var(--card-bg, #fff); color: var(--text-color, #000); box-sizing: border-box; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-submit { padding: 12px 24px; background: var(--accent, #4f46e5); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-cancel { padding: 12px 24px; background: var(--card-bg-secondary, #f3f4f6); color: var(--text-color, #1a1a1a); border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-left: 8px; }
    .image-upload-area { margin-top: 4px; }
    .image-upload-label { display: inline-block; padding: 8px 16px; background: var(--card-bg-secondary, #f3f4f6); color: var(--text-color, #1a1a1a); border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px dashed var(--border-color, #ccc); }
    .image-previews, .existing-images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .preview-item { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color, #ddd); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-remove { position: absolute; top: 2px; right: 2px; background: #ef4444; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; line-height: 18px; text-align: center; }
    .existing-badge { position: absolute; bottom: 2px; left: 2px; background: rgba(0,0,0,0.6); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 4px; }
    .empty-message { text-align: center; padding: 20px; color: var(--text-secondary, #6b7280); }
    @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="Student marketplace.html" class="logo">
      <span class="logo-icon">🛒</span>
      <span class="logo-text">Student<span class="logo-accent">Market</span></span>
    </a>
    <div class="nav-actions">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"><span class="theme-icon">🌙</span></button>
      <a href="Student marketplace.html" class="nav-link">Home</a>
      <a href="listings.html" class="nav-link">Browse</a>
      <a href="wishlist.html" class="nav-link">❤️ Wishlist</a>
      <div id="sm-user-info" class="nav-user-area"></div>
    </div>
  </nav>

  <main class="profile-page">
    <div class="profile-grid">
      <!-- Sidebar -->
      <aside>
        <div class="sidebar-card">
          <div class="avatar-wrapper" id="avatar-wrapper" title="Click to enlarge">
            <img id="avatar-img" src="" alt="Profile" style="display:none;" />
            <div class="avatar-placeholder" id="avatar-placeholder">S</div>
          </div>
          <label for="pfp-upload" class="avatar-upload-label">📷 Change Photo</label>
          <input type="file" id="pfp-upload" accept="image/*" style="display:none;" />
          
          <h3 class="sidebar-name" id="sidebar-name">Student Name</h3>
          <p class="sidebar-uni" id="sidebar-university">🎓 University</p>
          
          <div class="sidebar-stats">
            <div class="sidebar-stat"><span class="sidebar-stat-num" id="sidebar-listings">0</span><span class="sidebar-stat-label">Listings</span></div>
            <div class="sidebar-stat"><span class="sidebar-stat-num" id="sidebar-purchases">0</span><span class="sidebar-stat-label">Purchases</span></div>
            <div class="sidebar-stat"><span class="sidebar-stat-num" id="sidebar-wishlist">0</span><span class="sidebar-stat-label">Saved</span></div>
          </div>
          
          <a href="listings.html" class="sidebar-btn sidebar-btn-secondary">🔍 Browse Listings</a>
          <a href="Student marketplace.html" class="sidebar-btn sidebar-btn-secondary">🏠 Back to Home</a>
          <a href="#" id="sidebar-logout" class="sidebar-btn sidebar-btn-danger">🚪 Sign Out</a>
        </div>
      </aside>

      <!-- Main -->
      <section>
        <div class="main-card">
          <h2 class="card-heading">📦 Your Listings</h2>
          <ul id="profile-listings" class="compact-list"></ul>
        </div>

        <div class="main-card" id="edit-form-card">
          <h2 class="card-heading" id="form-title">🎁 Create New Listing</h2>
          <form id="add-listing-form">
            <input type="hidden" id="edit-product-id" value="" />
            
            <div class="form-group"><label>Item Title *</label><input id="listing-title" type="text" class="form-input" required /></div>
            
            <div class="form-row">
              <div class="form-group"><label>Price (K) *</label><input id="listing-price" type="text" class="form-input" required /></div>
              <div class="form-group">
                <label>Category *</label>
                <select id="listing-category" class="form-select">
                  <option value="">Select...</option>
                  <option value="textbooks">📚 Textbooks</option>
                  <option value="electronics">💻 Electronics</option>
                  <option value="furniture">🪑 Furniture</option>
                  <option value="clothing">👕 Clothing</option>
                  <option value="transport">🚲 Transport</option>
                  <option value="other">📦 Other</option>
                </select>
              </div>
            </div>
            
            <div class="form-group">
              <label>Condition</label>
              <select id="listing-condition" class="form-select">
                <option value="">Select...</option>
                <option value="new">🆕 Brand New</option>
                <option value="like-new">✨ Like New</option>
                <option value="good">✅ Good</option>
                <option value="fair">⚠️ Fair</option>
                <option value="poor">❌ Poor</option>
              </select>
            </div>
            
            <div class="form-group"><label>Description</label><textarea id="listing-description" class="form-textarea" rows="3"></textarea></div>
            
            <div class="form-group">
              <label>Photos</label>
              <div class="image-upload-area">
                <label for="listing-image" class="image-upload-label">📷 Choose Photos</label>
                <input type="file" id="listing-image" accept="image/*" multiple style="display:none;" />
                <span id="listing-image-name" style="font-size:12px;color:var(--text-secondary,#6b7280);margin-left:8px;">No photos selected</span>
              </div>
              <div class="existing-images" id="existing-images"></div>
              <div class="image-previews" id="image-previews"></div>
            </div>
            
            <div style="margin-top:16px;">
              <button type="submit" class="btn-submit" id="listing-submit-btn">🚀 Post Listing</button>
              <button type="button" class="btn-cancel" id="cancel-edit-btn" style="display:none;">Cancel</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="footer-bottom"><p>&copy; 2026 Student Marketplace.</p></div>
  </footer>

  <script src="auth.js"></script>
  <script src="theme-toggle.js"></script>
  <script>
    var API_BASE = './';
    var currentUser = null;
    var selectedFiles = [];

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function init() {
      currentUser = await SMAuth.getCurrentUser();
      if (!currentUser) { window.location.href = 'login.html'; return; }

      // Set user info
      document.getElementById('sidebar-name').textContent = currentUser.fullname || 'Student';
      document.getElementById('sidebar-university').textContent = '🎓 ' + (currentUser.university || 'University');
      
      // Profile picture
      var avatarImg = document.getElementById('avatar-img');
      var avatarPlaceholder = document.getElementById('avatar-placeholder');
      avatarPlaceholder.textContent = (currentUser.fullname || 'S').charAt(0).toUpperCase();
      
      if (currentUser.profileImage) {
        avatarImg.src = currentUser.profileImage + '?t=' + Date.now();
        avatarImg.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
      }

      // PFP click to enlarge
      document.getElementById('avatar-wrapper').addEventListener('click', function() {
        if (currentUser.profileImage) {
          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer;';
          overlay.innerHTML = '<div style="position:relative;max-width:90vw;max-height:90vh;"><img src="' + currentUser.profileImage + '" style="max-width:100%;max-height:90vh;border-radius:12px;"><button style="position:absolute;top:-35px;right:0;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;">&times;</button></div>';
          document.body.appendChild(overlay);
          overlay.addEventListener('click', function(e) { if (e.target === overlay || e.target.tagName === 'BUTTON') overlay.remove(); });
        }
      });

      // PFP upload
      document.getElementById('pfp-upload').addEventListener('change', async function() {
        var file = this.files[0];
        if (!file) return;
        var formData = new FormData();
        formData.append('profile_pic', file);
        try {
          var resp = await fetch(API_BASE + 'upload.php', { method: 'POST', body: formData });
          var result = await resp.json();
          if (result.success) {
            currentUser.profileImage = result.path;
            avatarImg.src = result.path + '?t=' + Date.now();
            avatarImg.style.display = 'block';
            avatarPlaceholder.style.display = 'none';
            alert('Profile picture updated!');
          } else {
            alert('Upload failed: ' + (result.error || 'Unknown error'));
          }
        } catch(e) { alert('Upload error'); }
      });

      await loadMyListings();

      document.getElementById('add-listing-form').addEventListener('submit', handleFormSubmit);
      document.getElementById('cancel-edit-btn').addEventListener('click', cancelEdit);
      
      var fileInput = document.getElementById('listing-image');
      fileInput.addEventListener('change', function() {
        selectedFiles = Array.from(this.files);
        renderPreviews();
      });
    }

    function renderPreviews() {
      var previewContainer = document.getElementById('image-previews');
      var fileNameSpan = document.getElementById('listing-image-name');
      previewContainer.innerHTML = '';
      selectedFiles.forEach(function(file, idx) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = '<img src="' + e.target.result + '"><button type="button" class="preview-remove" data-index="' + idx + '">×</button>';
          previewContainer.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
      fileNameSpan.textContent = selectedFiles.length > 0 ? selectedFiles.length + ' photo(s) selected' : 'No photos selected';
      
      document.querySelectorAll('.preview-remove').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(this.dataset.index);
          selectedFiles.splice(idx, 1);
          var dt = new DataTransfer();
          selectedFiles.forEach(function(f) { dt.items.add(f); });
          document.getElementById('listing-image').files = dt.files;
          renderPreviews();
        });
      });
    }

    async function loadMyListings() {
      try {
        var response = await fetch(API_BASE + 'get_products.php');
        var allProducts = await response.json();
        var myListings = allProducts.filter(function(p) { return p.sellerEmail === currentUser.email; });
        document.getElementById('sidebar-listings').textContent = myListings.length;

        var listEl = document.getElementById('profile-listings');
        if (myListings.length > 0) {
          listEl.innerHTML = myListings.map(function(p) {
            return '<li class="compact-list-item">' +
              '<span class="compact-list-title">' + escapeHtml(p.name || 'Untitled') + '</span>' +
              '<span class="compact-list-price">K' + parseFloat(p.price).toFixed(2) + '</span>' +
              '<span class="compact-list-status ' + (p.isSold ? 'status-sold' : 'status-active') + '">' + (p.isSold ? 'Sold' : 'Active') + '</span>' +
              '<button onclick="editProduct(\'' + p.id + '\')" class="btn-edit-sm">✏️ Edit</button>' +
              '</li>';
          }).join('');
        } else {
          listEl.innerHTML = '<li class="empty-message">No listings yet. Create your first listing below!</li>';
        }
      } catch(e) { console.error(e); }
    }

    async function editProduct(productId) {
      try {
        var response = await fetch(API_BASE + 'get_product.php?id=' + productId);
        var product = await response.json();
        if (product.error) { alert(product.error); return; }

        document.getElementById('edit-product-id').value = productId;
        document.getElementById('listing-title').value = product.name || '';
        document.getElementById('listing-price').value = product.price || '';
        document.getElementById('listing-description').value = product.description || '';
        document.getElementById('listing-category').value = (product.category || '').toLowerCase();
        document.getElementById('listing-condition').value = (product.condition || '').toLowerCase();
        
        var existingContainer = document.getElementById('existing-images');
        existingContainer.innerHTML = '';
        var images = [];
        if (product.imageUrl) {
          try { var parsed = JSON.parse(product.imageUrl); images = Array.isArray(parsed) ? parsed : [product.imageUrl]; }
          catch(e) { images = [product.imageUrl]; }
        }
        images.forEach(function(img) {
          if (img && img.trim()) {
            var div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = '<img src="' + img + '" onerror="this.style.display=\'none\'"><span class="existing-badge">Old</span>';
            existingContainer.appendChild(div);
          }
        });
        
        selectedFiles = [];
        document.getElementById('listing-image').value = '';
        document.getElementById('image-previews').innerHTML = '';
        document.getElementById('listing-image-name').textContent = 'No photos selected';
        document.getElementById('form-title').textContent = '✏️ Edit Listing';
        document.getElementById('listing-submit-btn').textContent = '💾 Update Listing';
        document.getElementById('cancel-edit-btn').style.display = 'inline-block';
        document.getElementById('edit-form-card').scrollIntoView({ behavior: 'smooth' });
      } catch(e) { alert('Failed to load product'); }
    }

    function cancelEdit() {
      document.getElementById('add-listing-form').reset();
      document.getElementById('edit-product-id').value = '';
      document.getElementById('form-title').textContent = '🎁 Create New Listing';
      document.getElementById('listing-submit-btn').textContent = '🚀 Post Listing';
      document.getElementById('cancel-edit-btn').style.display = 'none';
      document.getElementById('existing-images').innerHTML = '';
      selectedFiles = [];
      document.getElementById('listing-image').value = '';
      document.getElementById('image-previews').innerHTML = '';
      document.getElementById('listing-image-name').textContent = 'No photos selected';
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      var title = document.getElementById('listing-title').value.trim();
      var price = document.getElementById('listing-price').value.trim();
      var category = document.getElementById('listing-category').value;
      var condition = document.getElementById('listing-condition').value;
      var description = document.getElementById('listing-description').value.trim();
      var productId = document.getElementById('edit-product-id').value;
      if (!title || !price || !category || !condition) { alert('Fill all required fields'); return; }

      var imageUrls = [];
      if (selectedFiles.length > 0) {
        var uploadForm = new FormData();
        selectedFiles.forEach(function(f) { uploadForm.append('images[]', f); });
        try {
          var uploadResponse = await fetch(API_BASE + 'upload.php', { method: 'POST', body: uploadForm });
          var uploadResult = await uploadResponse.json();
          if (uploadResult.success && uploadResult.files) { imageUrls = uploadResult.files; }
          else { alert('Image upload failed'); return; }
        } catch(err) { alert('Upload error'); return; }
      }

      var listingData = {
        id: productId, name: title, price: parseFloat(price), category: category, condition: condition,
        description: description, sellerEmail: currentUser.email, sellerUniversity: currentUser.university || '',
        timestamp: Date.now() / 1000, imageUrl: imageUrls, isSold: 0
      };

      try {
        var response = await fetch(API_BASE + 'add_product.php', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(listingData)
        });
        var result = await response.text();
        if (response.ok && (result.indexOf('Success') !== -1 || result.indexOf('success') !== -1)) {
          alert(productId ? 'Listing updated!' : 'Listing posted!');
          cancelEdit();
          loadMyListings();
        } else { alert('Failed: ' + result); }
      } catch(err) { alert('Error saving listing'); }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

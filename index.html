<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PATRICK.HUD - High-Fidelity Student Workspace Telemetry</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root[data-theme="dark"] {
      --bg-main: #0b0f19;
      --bg-card: #151d30;
      --panel-bg: #111827;
      --panel-border: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --hero-title-color: #ffffff;
      --input-bg: #1e293b;
      --input-border: #334155;
    }
    :root[data-theme="light"] {
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --panel-bg: #f1f5f9;
      --panel-border: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --hero-title-color: #1e293b;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .landing-wrapper, .auth-wrapper, .dashboard-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .landing-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--panel-border);
      background: var(--bg-card);
    }
    .brand-logo {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--text-primary);
      cursor: pointer;
    }
    .brand-logo span {
      color: #6366f1;
    }
    .hud-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 600;
      border: 1px solid var(--panel-border);
      background: var(--bg-card);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }
    .hud-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-primary {
      background: #6366f1 !important;
      color: #ffffff !important;
      border-color: #4f46e5 !important;
    }
    .hero-section {
      text-align: center;
      max-width: 48rem;
      margin: 5rem auto;
      padding: 0 1.5rem;
    }
    .hero-tag {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #818cf8;
      background: rgba(99, 102, 241, 0.1);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
    }
    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      color: var(--hero-title-color);
      line-height: 1.2;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      max-width: 64rem;
      margin: 0 auto 4rem auto;
      padding: 0 1.5rem;
    }
    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--panel-border);
      padding: 1.5rem;
      border-radius: 0.5rem;
    }
    .info-icon {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .info-heading {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .info-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .auth-wrapper {
      justify-content: center;
      align-items: center;
      background: var(--bg-main);
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--panel-border);
      padding: 2.5rem;
      border-radius: 0.75rem;
      width: 100%;
      max-width: 28rem;
    }
    .hud-input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border-radius: 0.375rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-size: 0.875rem;
      margin-top: 0.375rem;
    }
    .hud-input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .auth-split-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .auth-split-row {
        grid-template-columns: 1fr 1fr;
      }
    }
    .input-icon-wrapper {
      position: relative;
    }
    .dashboard-container {
      flex-direction: row;
    }
    .nav-drawer {
      width: 16rem;
      background: var(--bg-card);
      border-right: 1px solid var(--panel-border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 40;
    }
    .drawer-menu {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .drawer-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0.875rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .drawer-item:hover, .drawer-item.active {
      background: rgba(99, 102, 241, 0.08);
      color: #818cf8;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem;
      overflow-y: auto;
    }
    .hud-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--panel-border);
    }
    .horizontal-metrics-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .metric-mini-card {
      background: var(--bg-card);
      border: 1px solid var(--panel-border);
      padding: 1.25rem;
      border-radius: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .metric-mini-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }
    .metric-mini-val {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .dashboard-layout-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    @media (min-width: 1024px) {
      .dashboard-layout-grid {
        grid-template-columns: 1fr 2fr;
      }
    }
    .panel-stack {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .panel-box {
      background: var(--bg-card);
      border: 1px solid var(--panel-border);
      padding: 1.5rem;
      border-radius: 0.5rem;
    }
    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-transform: uppercase;
      font-family: monospace;
      letter-spacing: 0.5px;
      color: #818cf8;
    }
    .hud-table {
      width: 100%;
      font-size: 0.875rem;
      text-align: left;
    }
    .hud-table th {
      padding: 0.75rem;
      border-bottom: 1px solid var(--panel-border);
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
    .hud-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--panel-border);
      color: var(--text-primary);
    }
    .hud-select {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border-radius: 0.375rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-size: 0.875rem;
      margin-top: 0.375rem;
    }
    .activity-feed-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.825rem;
      padding: 0.5rem 0;
      border-bottom: 1px dashed var(--panel-border);
    }
  </style>
</head>
<body>

  <div id="app-root"></div>

  <script type="text/babel">
    // Point this to your Node.js backend address running locally
    const API_BASE_URL = "http://localhost:5000/api/students";

    function App() {
      const [theme, setTheme] = React.useState(() => localStorage.getItem('student_theme_mode') || 'dark');
      const [view, setView] = React.useState('LANDING');
      const [isSignUp, setIsSignUp] = React.useState(false);
      const [authError, setAuthError] = React.useState('');
      const [currentUser, setCurrentUser] = React.useState(null);

      const [fullName, setFullName] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [phone, setPhone] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [confirmPassword, setConfirmPassword] = React.useState('');
      const [showPass, setShowPass] = React.useState(false);

      const [dashTab, setDashTab] = React.useState('ACTIVE_WORKSPACE');
      const [gradeFilter, setGradeFilter] = React.useState('ALL');
      const [searchQuery, setSearchQuery] = React.useState('');
      const [currentTime, setCurrentTime] = React.useState(new Date().toLocaleTimeString());

      const [studentName, setStudentName] = React.useState('');
      const [studentEmail, setStudentEmail] = React.useState('');
      const [studentGrade, setStudentGrade] = React.useState('A');
      const [studentAttendance, setStudentAttendance] = React.useState(100);
      const [editingStudentId, setEditingStudentId] = React.useState(null);

      // Backend dynamic connection states
      const [students, setStudents] = React.useState([]);
      const [telemetry, setTelemetry] = React.useState({ totalStudents: 0, avgAttendance: 0, passingRate: 0 });
      const [backendOnline, setBackendOnline] = React.useState(false);

      const [sprintTime, setSprintTime] = React.useState(1500);
      const [sprintActive, setSprintActive] = React.useState(false);
      const [activities, setActivities] = React.useState([
        { id: 1, text: 'Telemetry terminal monitoring engine configured.', logs: 'Live' }
      ]);

      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('student_theme_mode', theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(prev => {
          const next = prev === 'dark' ? 'light' : 'dark';
          pushActivity(`Switched workspace style theme to ${next} mode.`);
          return next;
        });
      };

      const pushActivity = (text) => {
        const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setActivities(prev => [{ id: Date.now(), text, logs: timeString }, ...prev]);
      };

      // FETCH FUNCTION: Loads data directly from your Express API backend
      const loadBackendData = async () => {
        try {
          const response = await fetch(API_BASE_URL);
          const result = await response.json();
          if (result.success) {
            setStudents(result.records);
            setTelemetry(result.telemetry);
            setBackendOnline(true);
          }
        } catch (err) {
          console.error("Backend unreachable:", err);
          setBackendOnline(false);
          pushActivity("Failed to stream telemetry from backend server API.");
        }
      };

      // Trigger load on component lifecycle launch
      React.useEffect(() => {
        if (view === 'DASHBOARD') {
          loadBackendData();
        }
      }, [view]);

      React.useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date().toLocaleTimeString()), 1000);
        return () => clearInterval(timer);
      }, []);

      React.useEffect(() => {
        let interval = null;
        if (sprintActive && sprintTime > 0) {
          interval = setInterval(() => setSprintTime(p => p - 1), 1000);
        } else if (sprintTime === 0) {
          setSprintActive(false);
          pushActivity('Focus study block completed.');
          alert("Focus session complete!");
          setSprintTime(1500);
        }
        return () => clearInterval(interval);
      }, [sprintActive, sprintTime]);

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        if (isSignUp && (!fullName.trim() || !email.trim() || !password.trim())) {
          setAuthError('All registration inputs are structural requirements.');
          return;
        }
        if (!email.trim() || !password.trim()) {
          setAuthError('Access credentials required.');
          return;
        }
        setCurrentUser({ name: email.split('@')[0], email: email });
        setView('DASHBOARD');
        pushActivity(`Session verified for profile context: ${email}`);
      };

      // CREATE / UPDATE FUNCTION: Submits new student nodes to backend route
      const handleSaveStudent = async (e) => {
        e.preventDefault();
        if (!studentName.trim() || !studentEmail.trim()) {
          alert("Please fill out name and email fields.");
          return;
        }

        const studentPayload = {
          name: studentName,
          email: studentEmail,
          grade: studentGrade,
          attendance: Number(studentAttendance)
        };

        try {
          let url = API_BASE_URL;
          let method = 'POST';

          if (editingStudentId) {
            url = `${API_BASE_URL}/${editingStudentId}`;
            method = 'PUT';
          }

          const response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(studentPayload)
          });

          const result = await response.json();
          if (result.success) {
            pushActivity(editingStudentId ? `Modified student entry: ${studentName}` : `Injected new database entity record: ${studentName}`);
            setEditingStudentId(null);
            setStudentName('');
            setStudentEmail('');
            setStudentGrade('A');
            setStudentAttendance(100);
            await loadBackendData(); // Force live refresh
          }
        } catch (err) {
          console.error("Failed to write to API cluster backend:", err);
          alert("Network connection error to backend database service.");
        }
      };

      // DELETE FUNCTION: Removes entry index via structural mutation request
      const handleDeleteStudent = async (id, name) => {
        if (!confirm(`Confirm structural truncation of entry: ${name}?`)) return;

        try {
          const response = await fetch(`${API_BASE_URL}/${id}`, { method: 'DELETE' });
          const result = await response.json();
          if (result.success) {
            pushActivity(`Purged entry reference for: ${name}`);
            await loadBackendData();
          }
        } catch (err) {
          console.error("Purge mutation failed:", err);
        }
      };

      const handleEditTrigger = (student) => {
        setEditingStudentId(student.id);
        setStudentName(student.name);
        setStudentEmail(student.email);
        setStudentGrade(student.grade);
        setStudentAttendance(student.attendance);
        setDashTab('ACTIVE_WORKSPACE');
      };

      const formatTimer = () => {
        const mins = Math.floor(sprintTime / 60);
        const secs = sprintTime % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const filteredStudents = students.filter(s => {
        const matchesGrade = gradeFilter === 'ALL' || s.grade === gradeFilter;
        const matchesSearch = s.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                              s.email.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesGrade && matchesSearch;
      });

      const SunIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2m-7.07-15.07 1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2m-15.42 5.66-1.41 1.41m14.14-14.14-1.41 1.41"/></svg>
      );
      const MoonIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      );

      if (view === 'LANDING') {
        return (
          <div className="landing-wrapper">
            <nav className="landing-nav">
              <div className="brand-logo" onClick={() => setView('LANDING')}>PATRICK<span>.HUD</span></div>
              <div className="flex items-center gap-4">
                <button onClick={toggleTheme} className="text-current">{theme === 'dark' ? <SunIcon /> : <MoonIcon />}</button>
                <button className="hud-btn" onClick={() => { setIsSignUp(false); setView('AUTH'); }}>Sign In</button>
                <button className="hud-btn btn-primary" onClick={() => { setIsSignUp(true); setView('AUTH'); }}>Get Started</button>
              </div>
            </nav>
            <div className="hero-section">
              <span className="hero-tag">DISTRIBUTED EXPRESS STORAGE ENGINE</span>
              <h1 className="hero-title">High-Fidelity Student Workspace Telemetry & Database Monitor</h1>
              <p className="mb-8 text-sm opacity-80">Connected directly to automated backend routing frameworks stream processing live MongoDB instances across production boundaries.</p>
              <div className="flex justify-center gap-4">
                <button className="hud-btn btn-primary px-6 py-3" onClick={() => { setIsSignUp(true); setView('AUTH'); }}>Initialize Matrix Terminal</button>
              </div>
            </div>
          </div>
        );
      }

      if (view === 'AUTH') {
        return (
          <div className="auth-wrapper">
            <div className="auth-card">
              <h2 className="text-xl font-bold mb-4">Authorized Access Verification</h2>
              {authError && <div className="text-red-400 text-xs mb-2">{authError}</div>}
              <form onSubmit={handleAuthSubmit} className="flex flex-col gap-4">
                {isSignUp && <input type="text" className="hud-input" placeholder="Full Legal Identity" value={fullName} onChange={e => setFullName(e.target.value)} />}
                <input type="email" className="hud-input" placeholder="Secure Network Email Link Address" value={email} onChange={e => setEmail(e.target.value)} />
                <input type="password" className="hud-input" placeholder="Security Cipher Key" value={password} onChange={e => setPassword(e.target.value)} />
                <button type="submit" className="hud-btn btn-primary mt-2">Authorize Runtime Session</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="dashboard-container">
          <aside className="nav-drawer">
            <div>
              <div className="brand-logo">PATRICK<span>.HUD</span></div>
              <div className="drawer-menu">
                <div className={`drawer-item ${dashTab === 'ACTIVE_WORKSPACE' ? 'active' : ''}`} onClick={() => setDashTab('ACTIVE_WORKSPACE')}>Workspace Logic Engine</div>
                <div className={`drawer-item ${dashTab === 'DATABASE_MATRIX' ? 'active' : ''}`} onClick={() => setDashTab('DATABASE_MATRIX')}>Database Ledger Matrix</div>
              </div>
            </div>
            <div className="text-xs opacity-60">Session User: {currentUser?.name}</div>
          </aside>

          <main className="main-content">
            <header className="hud-header">
              <div>
                <h1 className="text-lg font-bold">TELEMETRY MONITOR DATA HUB</h1>
                <p className="text-xs opacity-60">Status: {backendOnline ? '⚡ BACKEND PRODUCTION ONLINE' : '❌ DISCONNECTED FROM NODE API'}</p>
              </div>
              <div className="text-right">
                <div className="text-sm font-mono">{currentTime}</div>
                <button onClick={toggleTheme} className="mt-1">{theme === 'dark' ? <SunIcon /> : <MoonIcon />}</button>
              </div>
            </header>

            <section className="horizontal-metrics-row">
              <div className="metric-mini-card"><span className="metric-mini-label">Total Student Identity Entities</span><div className="metric-mini-val">{telemetry.totalStudents}</div></div>
              <div className="metric-mini-card"><span className="metric-mini-label">Mean Core Attendance Matrix</span><div className="metric-mini-val">{telemetry.avgAttendance}%</div></div>
              <div className="metric-mini-card"><span className="metric-mini-label">Passing Rate Threshold Performance</span><div className="metric-mini-val">{telemetry.passingRate}%</div></div>
            </section>

            {dashTab === 'ACTIVE_WORKSPACE' ? (
              <div className="dashboard-layout-grid">
                <div className="panel-box">
                  <h3 className="panel-title">{editingStudentId ? 'Modify Schema Identity' : 'Inject Identity Document Parameter'}</h3>
                  <form onSubmit={handleSaveStudent} className="flex flex-col gap-3">
                    <input type="text" className="hud-input" placeholder="Full Registry Name" value={studentName} onChange={e => setStudentName(e.target.value)} />
                    <input type="email" className="hud-input" placeholder="Network Target Email" value={studentEmail} onChange={e => setStudentEmail(e.target.value)} />
                    <select className="hud-select" value={studentGrade} onChange={e => setStudentGrade(e.target.value)}>
                      <option value="A">Grade Mark Tier A</option>
                      <option value="B">Grade Mark Tier B</option>
                      <option value="C">Grade Mark Tier C</option>
                      <option value="D">Grade Mark Tier D</option>
                      <option value="F">Structural Failure F</option>
                    </select>
                    <input type="number" className="hud-input" placeholder="Attendance Multiplier (%)" value={studentAttendance} onChange={e => setStudentAttendance(e.target.value)} />
                    <button type="submit" className="hud-btn btn-primary w-full mt-2">{editingStudentId ? 'Commit Node Mutation' : 'Execute Storage Pipeline'}</button>
                  </form>
                </div>

                <div className="panel-stack">
                  <div className="panel-box">
                    <h3 className="panel-title">System Focus Core Sprint Block</h3>
                    <div className="flex items-center justify-between">
                      <div className="text-2xl font-mono">{formatTimer()}</div>
                      <button className="hud-btn" onClick={() => setSprintActive(!sprintActive)}>{sprintActive ? 'Halt Process' : 'Initialize Sprint'}</button>
                    </div>
                  </div>
                  <div className="panel-box">
                    <h3 className="panel-title">System Execution Feed</h3>
                    <div className="flex flex-col gap-1 max-h-40 overflow-y-auto font-mono text-xs">
                      {activities.map(act => (
                        <div key={act.id} className="activity-feed-item"><span>{act.text}</span><span className="opacity-50">{act.logs}</span></div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="panel-box">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="panel-title">Global Document Index Cache</h3>
                  <input type="text" className="hud-input max-w-xs" placeholder="Filter strings..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                </div>
                <table className="hud-table">
                  <thead>
                    <tr><th>Identity Hash</th><th>Identity Entity Domain Descriptor</th><th>Grade</th><th>Attendance</th><th>Actions Matrix</th></tr>
                  </thead>
                  <tbody>
                    {filteredStudents.map(s => (
                      <tr key={s.id}>
                        <td className="font-mono text-xs">{s.id}</td>
                        <td><div>{s.name}</div><div className="text-xs opacity-50">{s.email}</div></td>
                        <td>{s.grade}</td>
                        <td>{s.attendance}%</td>
                        <td>
                          <button className="text-indigo-400 mr-3" onClick={() => handleEditTrigger(s)}>Mutation</button>
                          <button className="text-red-400" onClick={() => handleDeleteStudent(s.id, s.name)}>Purge</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);
    root.render(<App />);
  </script>
</body>
</html>
